appId: ai.openovel.app
productName: openovel
copyright: openovel contributors

asar: true
asarUnpack:
  - node_modules/react/**

directories:
  output: dist-electron/release

files:
  - "src/**/*"
  - "scripts/**/*"
  - "dist-electron/renderer/**/*"
  - "package.json"
  - "!**/*.test.js"
  - "!**/test/**"
  - "!**/.git/**"
  - "!**/coverage/**"
  - "!**/dist/**"
  - "!**/data/**"
  - "!**/story/**"

# Bundled starter stories: pre-initialized novel snapshots seeded into an empty
# library on first run. Shipped OUTSIDE the asar so the runtime reads them as
# plain files at process.resourcesPath/starter-stories (src/lib/starterStories.js).
extraResources:
  - from: resources/starter-stories
    to: starter-stories

extraMetadata:
  main: "src/electron/main.js"

mac:
  category: public.app-category.entertainment
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: build/icon.png

win:
  target:
    - target: portable
      arch:
        - x64
  icon: build/icon.png

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Game
  icon: build/icons
