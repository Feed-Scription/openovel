name: Bug report
description: Report a reproducible problem in the desktop app or runtime.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please remove API keys, private story text,
        and full model transcripts before attaching logs.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
      placeholder: The app...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or git commit SHA
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Platform
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open...
        2. Click...
        3. See...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Paste relevant output from npm run config:doctor or npm run provider:doctor when setup/routing is involved.
      render: text
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, short logs, or notes about whether this happens with a fresh OPENOVEL_HOME.
